<!DOCTYPE html>
<html>
<head>

<title>ThermoNova Industrial Waste Heat Analysis</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
font-family:Arial;
background:#f4f4f4;
margin:0;
padding:20px;
}

header{
background:#343a40;
color:white;
padding:15px;
text-align:center;
font-size:22px;
}

section{
background:white;
padding:20px;
margin-top:20px;
border-radius:6px;
}

button{
padding:10px 15px;
background:#007bff;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}

canvas{
margin-top:20px;
}

</style>

</head>

<body>

<header>
ThermoNova Industrial Waste Heat Analysis
</header>

<section>

<h2>Upload CSV Data</h2>

<input type="file" id="csvFile">

<br><br>

<button onclick="loadCSV()">Upload Data</button>

<p id="dataStatus"></p>

</section>

<section>

<h2>Analysis Engine</h2>

<button onclick="runAnalysis()">Run Analysis</button>

<p id="analysisResult"></p>

<canvas id="energyChart"></canvas>

</section>

<section>

<h2>Download Report</h2>

<button onclick="downloadReport()">Download Report</button>

</section>

<script>

let dataset = [];

function loadCSV(){

const file = document.getElementById("csvFile").files[0];

const reader = new FileReader();

reader.onload = function(e){

const lines = e.target.result.split("\n");

dataset = [];

for(let i=1;i<lines.length;i++){

const cols = lines[i].split(",");

if(cols.length >= 3){

dataset.push({

flow:parseFloat(cols[0]),
cp:parseFloat(cols[1]),
deltaT:parseFloat(cols[2])

});

}

}

document.getElementById("dataStatus").innerHTML =
"Dataset loaded with "+dataset.length+" records";

};

reader.readAsText(file);

}

function runAnalysis(){

let energy=[];

let totalPower=0;

for(let i=0;i<dataset.length;i++){

let Q = dataset[i].flow * dataset[i].cp * dataset[i].deltaT;

let electrical = Q * 0.2;

energy.push(electrical);

totalPower += electrical;

}

document.getElementById("analysisResult").innerHTML =
"Estimated recoverable electrical power: "+totalPower.toFixed(2)+" kW";

drawChart(energy);

}

function drawChart(data){

const ctx=document.getElementById('energyChart');

new Chart(ctx,{

type:'bar',

data:{

labels:data.map((v,i)=>"Unit "+i),

datasets:[{

label:"Recoverable Power kW",

data:data

}]

}

});

}

function downloadReport(){

let report="unit,power\n";

for(let i=0;i<dataset.length;i++){

let Q = dataset[i].flow * dataset[i].cp * dataset[i].deltaT;

let electrical = Q * 0.2;

report+=i+","+electrical+"\n";

}

const blob=new Blob([report],{type:"text/csv"});

const a=document.createElement("a");

a.href=URL.createObjectURL(blob);

a.download="thermonova_report.csv";

a.click();

}

</script>

</body>
</html>
