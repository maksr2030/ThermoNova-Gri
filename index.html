<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ThermoNova v8 Industrial Thermodynamic Engine</title>

<style>

body{
font-family:Arial;
background:#eef2f7;
margin:0;
padding:30px;
color:#1f2937;
}

.container{
max-width:1300px;
margin:auto;
}

.header{
background:linear-gradient(135deg,#1e3a8a,#0f766e);
color:white;
padding:30px;
border-radius:20px;
margin-bottom:20px;
}

.header h1{
margin:0;
font-size:34px;
}

.card{
background:white;
padding:22px;
border-radius:14px;
margin-bottom:18px;
box-shadow:0 6px 20px rgba(0,0,0,0.06);
}

button{
padding:14px 18px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
font-size:18px;
cursor:pointer;
margin-right:10px;
}

button.secondary{
background:#475569;
}

button.green{
background:#15803d;
}

.status{
background:#e0ecff;
padding:14px;
border-radius:10px;
margin-top:10px;
}

.metric-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:16px;
}

.metric{
background:#f8fafc;
padding:16px;
border-radius:12px;
border:1px solid #dbeafe;
}

.metric-value{
font-size:28px;
font-weight:bold;
}

.table-container{
overflow-x:auto;
border:1px solid #dbeafe;
border-radius:10px;
}

table{
border-collapse:collapse;
min-width:1400px;
width:100%;
}

th,td{
padding:10px;
border-bottom:1px solid #e5e7eb;
font-size:14px;
}

th{
background:#dbeafe;
}

.chart-box{
margin-top:25px;
}

canvas{
background:white;
border-radius:12px;
padding:10px;
}

</style>
</head>

<body>

<div class="container">

<div class="header">
<h1>ThermoNova v8</h1>
Industrial Thermodynamic Engine
</div>

<div class="card">

<h2>Data Input</h2>

<input type="file" id="csvFile">

<br><br>

<button id="loadExample">Load Example Dataset</button>
<button class="green" id="runAnalysis">Run Analysis</button>
<button class="secondary" id="downloadReport">Download HTML Report</button>

<div class="status" id="statusBox">
Waiting for dataset
</div>

</div>

<div class="card">

<h2>Executive Summary</h2>

<div class="metric-grid">

<div class="metric">
Total Sources
<div class="metric-value" id="totalSources">0</div>
</div>

<div class="metric">
Top Electrical Power
<div class="metric-value" id="topPower">0</div>
</div>

<div class="metric">
Annual Value
<div class="metric-value" id="annualValue">$0</div>
</div>

<div class="metric">
CO2 Avoided
<div class="metric-value" id="co2Avoided">0</div>
</div>

</div>

</div>

<div class="card">

<h2>Opportunity Ranking</h2>

<div class="table-container">
<table id="resultsTable">

<thead>
<tr>
<th>Rank</th>
<th>Source</th>
<th>Plant Unit</th>
<th>Technology</th>
<th>Power kW</th>
<th>Annual Value</th>
<th>Payback</th>
<th>NPV</th>
<th>IRR</th>
<th>CO2 Avoided</th>
</tr>
</thead>

<tbody></tbody>

</table>
</div>

</div>

<div class="card">

<h2>Charts</h2>

<div class="chart-box">
<canvas id="powerChart"></canvas>
</div>

<div class="chart-box">
<canvas id="valueChart"></canvas>
</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

const exampleCsv = `source_id,plant_unit,equipment_type,process_criticality,mass_flow,cp,t_hot,t_cold,pressure,operating_state,operating_hours,electricity_price,grid_emission_factor,maintenance_window
SRC001,Boiler_A,Furnace,High,3.2,4.18,250,120,7.5,1,7200,0.11,0.47,Q3
SRC002,Furnace_B,Furnace,High,3.6,4.18,270,140,8.1,1,6800,0.11,0.47,Q2
SRC003,Reactor_C,Heater,Medium,3.0,4.18,240,110,6.9,1,7600,0.11,0.47,Q4
SRC004,Column_D,Reboiler,High,3.4,4.18,260,130,7.8,1,7400,0.11,0.47,Q2`;

let csvData = "";

document.getElementById("loadExample").onclick = () => {
csvData = exampleCsv;
statusBox.innerText="Example dataset loaded";
}

document.getElementById("csvFile").onchange = async e => {
csvData = await e.target.files[0].text();
statusBox.innerText="CSV file loaded";
}

document.getElementById("runAnalysis").onclick = () => {

let rows = csvData.trim().split("\n").slice(1);

let results=[];

rows.forEach(r=>{

let p=r.split(",")

let mass=parseFloat(p[4])
let cp=parseFloat(p[5])
let th=parseFloat(p[6])
let tc=parseFloat(p[7])

let delta=th-tc

let thermal=mass*cp*delta

let power=thermal*0.22

let annual=power*7200*0.11

let capex=power*1800

let payback=capex/annual

let npv=annual*6

let irr=(annual/capex)*100

let co2=power*7200*0.47/1000

results.push({
source:p[0],
plant:p[1],
power,
annual,
payback,
npv,
irr,
co2
})

})

results.sort((a,b)=>b.power-a.power)

renderTable(results)

renderCharts(results)

updateSummary(results)

statusBox.innerText="Analysis completed"

}

function renderTable(rows){

let tbody=document.querySelector("#resultsTable tbody")

tbody.innerHTML=""

rows.forEach((r,i)=>{

tbody.innerHTML+=`
<tr>
<td>${i+1}</td>
<td>${r.source}</td>
<td>${r.plant}</td>
<td>ORC</td>
<td>${r.power.toFixed(1)}</td>
<td>$${r.annual.toFixed(0)}</td>
<td>${r.payback.toFixed(2)}</td>
<td>$${r.npv.toFixed(0)}</td>
<td>${r.irr.toFixed(1)}%</td>
<td>${r.co2.toFixed(1)}</td>
</tr>
`

})

}

function updateSummary(rows){

totalSources.innerText=rows.length

topPower.innerText=rows[0].power.toFixed(1)+" kW"

let annual=rows.reduce((a,b)=>a+b.annual,0)

annualValue.innerText="$"+annual.toFixed(0)

let co2=rows.reduce((a,b)=>a+b.co2,0)

co2Avoided.innerText=co2.toFixed(1)+" t"

}

function renderCharts(rows){

new Chart(powerChart,{
type:'bar',
data:{
labels:rows.map(r=>r.source),
datasets:[{
label:'Electrical Power',
data:rows.map(r=>r.power),
backgroundColor:'#2563eb'
}]
}
})

new Chart(valueChart,{
type:'bar',
data:{
labels:rows.map(r=>r.source),
datasets:[{
label:'Annual Value',
data:rows.map(r=>r.annual),
backgroundColor:'#16a34a'
}]
}
})

}

document.getElementById("downloadReport").onclick=()=>{

let report=document.documentElement.outerHTML

let blob=new Blob([report],{type:"text/html"})

let a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="ThermoNova_Report.html"

a.click()

}

</script>

</body>
</html>
