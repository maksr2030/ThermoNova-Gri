
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ThermoNova v15.1 Industrial Energy Planning Platform</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{font-family:Arial;margin:0;background:#eef3f9;color:#111}
.container{max-width:1200px;margin:auto;padding:20px}
.card{background:#fff;border-radius:16px;padding:20px;margin-bottom:20px}
h1{font-size:34px;margin:0 0 10px 0}
h2{font-size:24px;color:#1d4ed8}
button{padding:14px 20px;border-radius:12px;border:none;margin:6px;font-size:18px;color:white;cursor:pointer}
.gray{background:#475569}
.orange{background:#b45309}
.green{background:#15803d}
.blue{background:#2563eb}
.purple{background:#7c3aed}
.status{margin-top:12px;padding:14px;border-radius:12px;background:#e0ecff}
</style>
</head>

<body>
<div class="container">

<div class="card">
<h1>ThermoNova v15.1</h1>
<p>Industrial Waste Heat Planning Platform</p>
</div>

<div class="card">
<h2>Actions</h2>
<button class="gray" onclick="loadCSVExample()">Load CSV Example</button>
<button class="gray" onclick="loadJSONExample()">Load JSON Example</button>
<button class="orange" onclick="simulateAPI()">Simulate REST API</button>
<button class="orange" onclick="simulateMQTT()">Simulate MQTT</button>
<button class="green" onclick="runAnalysis()">Run Planning Analysis</button>
<button class="blue" onclick="downloadReport()">Download HTML Report</button>
<button class="purple" onclick="downloadReport()">Export Final Report</button>

<input type="file" id="fileUpload" style="margin-top:12px"/>
<div class="status" id="status">Waiting for dataset.</div>
</div>

<div class="card">
<h2>Portfolio Results</h2>
<canvas id="powerChart" height="100"></canvas>
</div>

</div>

<script>

let rawData = []
let results = []

function normalizeKey(s){
return String(s || "")
.replace(/^\\uFEFF/,"")
.trim()
.toLowerCase()
.replace(/[\\s\\-]+/g,"_")
}

function detectIdentityColumn(row){

let keys = Object.keys(row)
let normalized = {}

keys.forEach(k=>{
normalized[normalizeKey(k)] = k
})

let candidates = [
"source_id","source","id","asset_id","asset","tag","name","unit_id"
]

for(let c of candidates){
if(normalized[c]) return normalized[c]
}

/* fallback = first column */
return keys[0]

}

function parseCSV(text){

let lines = text.trim().split(/\\r?\\n/)
let headers = lines[0].split(",").map(h=>h.trim())

let rows=[]

for(let i=1;i<lines.length;i++){

let vals = lines[i].split(",")

let obj={}

headers.forEach((h,j)=>{
obj[h]=vals[j]
})

rows.push(obj)
}

return rows
}

function runAnalysis(){

if(!rawData.length){
document.getElementById("status").innerText="No dataset loaded."
return
}

let idCol = detectIdentityColumn(rawData[0])

results = rawData.map(r=>{

let hot = Number(r.t_hot)
let cold = Number(r.t_cold)
let mass = Number(r.mass_flow)
let cp = Number(r.cp)
let hours = Number(r.hours)
let price = Number(r.price)

let thermal = mass*cp*(hot-cold)
let electrical = thermal*0.20
let value = electrical*hours*price

return {
id:r[idCol],
electrical,
value
}

})

renderCharts()

document.getElementById("status").innerText=
"Analysis complete. Identity column detected: "+idCol

}

function renderCharts(){

let labels = results.slice(0,20).map(r=>r.id)
let data = results.slice(0,20).map(r=>r.electrical)

new Chart(document.getElementById("powerChart"),{
type:"bar",
data:{
labels:labels,
datasets:[{label:"Electrical kW",data:data}]
}
})

}

function downloadReport(){

let blob = new Blob([document.documentElement.outerHTML],{type:"text/html"})
let a=document.createElement("a")
a.href=URL.createObjectURL(blob)
a.download="ThermoNova_v15_Industrial_Report.html"
a.click()

}

function loadCSVExample(){

let csv=`source,mass_flow,cp,t_hot,t_cold,hours,price
SRC01,3.2,4.18,250,120,7200,0.11
SRC02,2.7,4.18,210,95,7000,0.11
SRC03,3.6,4.18,270,140,6800,0.11`

rawData = parseCSV(csv)

document.getElementById("status").innerText="CSV example loaded"

}

function loadJSONExample(){

rawData=[
{source:"SRC01",mass_flow:3.2,cp:4.18,t_hot:250,t_cold:120,hours:7200,price:0.11},
{source:"SRC02",mass_flow:2.7,cp:4.18,t_hot:210,t_cold:95,hours:7000,price:0.11}
]

document.getElementById("status").innerText="JSON example loaded"

}

function simulateAPI(){loadJSONExample()}
function simulateMQTT(){loadJSONExample()}

document.getElementById("fileUpload").addEventListener("change",async e=>{

let file=e.target.files[0]

let text = await file.text()

if(file.name.endsWith(".csv")){
rawData=parseCSV(text)
}else{
rawData=JSON.parse(text)
}

document.getElementById("status").innerText="Dataset uploaded"

})

</script>

</body>
</html>
