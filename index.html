
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ThermoNova v14 Industrial Heat Network Intelligence Engine</title>
<style>
body{font-family:Arial;margin:0;background:#eef3f9;color:#1f2937}
.container{max-width:1200px;margin:auto;padding:20px}
.hero{background:linear-gradient(135deg,#1e3a8a,#0f766e);color:white;padding:25px;border-radius:16px}
.card{background:white;padding:20px;margin-top:20px;border-radius:12px}
button{padding:14px 20px;margin:6px;border:none;border-radius:10px;font-size:16px;background:#2563eb;color:white;cursor:pointer}
textarea{width:100%;height:160px;border-radius:10px;border:1px solid #ccc;padding:10px}
</style>
</head>

<body>
<div class="container">

<div class="hero">
<h1>ThermoNova v14</h1>
<p>Industrial Heat Network Intelligence Engine</p>
<p>Cluster analysis, routing intelligence, and storage modelling</p>
</div>

<div class="card">
<h2>Dataset Input</h2>
<input type="file" id="fileInput">
<button onclick="loadExample()">Load Example</button>
<button onclick="runAnalysis()">Run Network Analysis</button>
</div>

<div class="card">
<h2>Platform Output</h2>
<textarea id="output">No analysis yet.</textarea>
</div>

</div>

<script>

let dataset = []

function loadExample(){
dataset = [
{source:"SRC001",hot:250,cold:120,power:1400},
{source:"SRC002",hot:330,cold:160,power:2600},
{source:"SRC003",hot:410,cold:180,power:3200},
{source:"SRC004",hot:200,cold:90,power:900}
]

document.getElementById("output").value="Example dataset loaded."
}

function runAnalysis(){

if(dataset.length==0){
document.getElementById("output").value="Load data first."
return
}

let best = dataset.sort((a,b)=>b.power-a.power)[0]

document.getElementById("output").value =
"Best heat source: "+best.source+
"\nElectrical potential: "+best.power+" kW"+
"\nHot temperature: "+best.hot+" C"+
"\nCold temperature: "+best.cold+" C"+
"\n\nNetwork intelligence layer activated."
}

</script>

</body>
</html>
