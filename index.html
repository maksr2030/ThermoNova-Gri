<!DOCTYPE html>
<html>
<head>
<title>ThermoNova Industrial Waste Heat Analysis</title>
<style>
body{
font-family:Arial;
margin:0;
padding:20px;
background:#f4f4f4;
}

header{
background:#343a40;
color:white;
padding:15px;
text-align:center;
}

section{
background:white;
padding:20px;
margin-top:20px;
border-radius:6px;
}

button{
padding:10px 15px;
background:#007bff;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#0056b3;
}
</style>
</head>

<body>

<header>
<h1>ThermoNova Industrial Waste Heat Analysis</h1>
</header>

<section>

<h2>Upload CSV Data</h2>

<input type="file" id="csvFile">

<br><br>

<button onclick="uploadData()">Upload Data</button>

</section>

<section>

<h2>Analysis Engine</h2>

<button onclick="runAnalysis()">Run Analysis</button>

<p id="result"></p>

</section>

<section>

<h2>Download Report</h2>

<button onclick="downloadReport()">Download Report</button>

</section>

<script>

function uploadData(){
alert("CSV file loaded successfully.");
}

function runAnalysis(){
document.getElementById("result").innerHTML =
"Analysis complete. Waste heat recovery potential detected.";
}

function downloadReport(){
alert("Report download feature will be generated in next version.");
}

</script>

</body>
</html>
